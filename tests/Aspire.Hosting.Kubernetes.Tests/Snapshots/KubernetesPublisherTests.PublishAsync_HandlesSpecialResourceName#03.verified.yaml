---
apiVersion: "v1"
kind: "ConfigMap"
metadata:
  name: "special-app-config"
  labels:
    app: "aspire"
    component: "SpeciaL-ApP"
data:
  ASPNETCORE_Kestrel__Endpoints__http__Url: "{{ .Values.config.SpeciaL_ApP.ASPNETCORE_Kestrel__Endpoints__http__Url }}"
  ASPNETCORE_Kestrel__Endpoints__http__Protocols: "{{ .Values.config.SpeciaL_ApP.ASPNETCORE_Kestrel__Endpoints__http__Protocols }}"
  OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EXCEPTION_LOG_ATTRIBUTES: "{{ .Values.config.SpeciaL_ApP.OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EXCEPTION_LOG_ATTRIBUTES }}"
  OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EVENT_LOG_ATTRIBUTES: "{{ .Values.config.SpeciaL_ApP.OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EVENT_LOG_ATTRIBUTES }}"
  OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "{{ .Values.config.SpeciaL_ApP.OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY }}"
  ASPNETCORE_FORWARDEDHEADERS_ENABLED: "{{ .Values.config.SpeciaL_ApP.ASPNETCORE_FORWARDEDHEADERS_ENABLED }}"
  HTTP_PORTS: "{{ .Values.config.SpeciaL_ApP.HTTP_PORTS }}"
