---
apiVersion: "v1"
kind: "ConfigMap"
metadata:
  name: "myapp-config"
  labels:
    app.kubernetes.io/name: "aspire-hosting-tests"
    app.kubernetes.io/component: "myapp"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
data:
  TLS_SUFFIX: {{ ternary ",ssl=true" ",ssl=false" (eq .Values.parameters.myapp.enable_tls "True") | quote }}
