---
apiVersion: "v1"
kind: "Service"
metadata:
  name: "servicea-service"
spec:
  type: "ClusterIP"
  selector:
    app: "aspire"
    component: "ServiceA"
  ports:
    - name: "http"
      protocol: "TCP"
      port: 80
      targetPort: "http"
    - name: "https"
      protocol: "TCP"
      port: 81
      targetPort: "https"
