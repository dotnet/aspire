---
apiVersion: "v1"
kind: "Service"
metadata:
  name: "serviceb-service"
spec:
  type: "ClusterIP"
  selector:
    app: "aspire"
    component: "ServiceB"
  ports:
    - name: "http"
      protocol: "TCP"
      port: 80
      targetPort: "http"
    - name: "https"
      protocol: "TCP"
      port: 81
      targetPort: "https"
