services:
  docker-compose-dashboard:
    image: "mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest"
    ports:
      - "8000:18888"
      - "8001:18889"
    networks:
      - "aspire"
    restart: "always"
  api:
    image: "my-api:latest"
    networks:
      - "aspire"
networks:
  aspire:
    driver: "bridge"
