# TypeScript SDK Unit Tests
# Validates the static TypeScript files (transport.ts, base.ts) that are part of the
# polyglot TypeScript AppHost SDK. These files are not generated — they contain core
# transport, serialization, and type logic that should be covered by fast unit tests.
name: TypeScript SDK Unit Tests

on:
  workflow_call:

jobs:
  typescript_unit_tests:
    name: TypeScript SDK Tests Job
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: tests/Aspire.Hosting.CodeGeneration.TypeScript.JsTests

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run --reporter=verbose
