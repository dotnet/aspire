name: CI

on:
  pull_request:
    branches:
      - main
      - 'release/**'


  push:
    branches:
      - main
      - 'release/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:

  tests:
    uses: ./.github/workflows/tests.yml
    name: Tests
    if: ${{ github.repository_owner == 'dotnet' }}

  # This job is used for branch protection. It fails if any of the dependent jobs failed
  results:
    if: ${{ always() && github.repository_owner == 'dotnet' }}
    runs-on: ubuntu-latest
    name: Final Results
    needs: [tests]

    steps:
      - name: Fail if any of the dependent jobs failed
        # Don't fail if the workflow is being skipped.
        # The tests workflow outputs skip_workflow=true when all tests are
        # skipped (e.g. doc-only PRs). In that case, downstream jobs are
        # legitimately skipped and should not cause a failure.
        if: >-
          ${{ always() &&
              needs.tests.outputs.skip_workflow != 'true' &&
              (contains(needs.*.result, 'failure') ||
               contains(needs.*.result, 'cancelled') ||
               contains(needs.*.result, 'skipped')) }}
        run: |
          echo "One or more dependent jobs failed."
          exit 1
