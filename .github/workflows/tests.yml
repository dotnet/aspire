name: Tests

on:
  workflow_call:
    inputs:
      versionOverrideArg:
        required: false
        type: string
    outputs:
      skip_workflow:
        description: 'True if all tests were skipped'
        value: ${{ jobs.prepare_for_tests.outputs.all_skipped }}

jobs:
  # Detect which test categories should run and compute version info
  prepare_for_tests:
    name: Prepare for tests
    runs-on: ubuntu-latest
    outputs:
      run_all: ${{ steps.detect.outputs.run_all }}
      run_integrations: ${{ steps.detect.outputs.run_integrations }}
      run_cli_e2e: ${{ steps.detect.outputs.run_cli_e2e }}
      run_extension: ${{ steps.detect.outputs.run_extension }}
      run_polyglot: ${{ steps.detect.outputs.run_polyglot }}
      affected_test_projects: ${{ steps.detect.outputs.affected_test_projects }}
      # True if all test categories are skipped and no affected projects
      all_skipped: ${{ steps.detect.outputs.run_all != 'true' && steps.detect.outputs.run_integrations != 'true' && steps.detect.outputs.run_cli_e2e != 'true' && steps.detect.outputs.run_extension != 'true' && steps.detect.outputs.run_polyglot != 'true' && steps.detect.outputs.affected_test_projects == '[]' }}
      versionOverrideArg: ${{ steps.compute_version_suffix.outputs.VERSION_SUFFIX_OVERRIDE || inputs.versionOverrideArg }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - id: compute_version_suffix
        name: Compute version suffix for PRs
        if: ${{ github.event_name == 'pull_request' && inputs.versionOverrideArg == '' }}
        shell: pwsh
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          Write-Host "Determining VERSION_SUFFIX_OVERRIDE (PR only step)..."
          if ([string]::IsNullOrWhiteSpace($Env:PR_HEAD_SHA)) {
            Write-Error "PR_HEAD_SHA not set; cannot compute version suffix."
            exit 1
          }
          $SHORT_SHA = $Env:PR_HEAD_SHA.Substring(0,8)
          $VERSION_SUFFIX = "/p:VersionSuffix=pr.$($Env:PR_NUMBER).g$SHORT_SHA"
          Write-Host "Computed VERSION_SUFFIX_OVERRIDE=$VERSION_SUFFIX"
          "VERSION_SUFFIX_OVERRIDE=$VERSION_SUFFIX" | Out-File -FilePath $Env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Restore local SDK
        run: ./restore.sh

      - name: Install dotnet-affected
        if: github.event_name == 'pull_request'
        run: ./dotnet.sh tool install --global dotnet-affected --version 6.2.0-preview-1

      - name: Evaluate changed paths
        id: detect_raw
        continue-on-error: true
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "::group::Running test selector tool"
            ./dotnet.sh run --project tools/TestSelector/TestSelector.csproj -- \
              --solution Aspire.slnx \
              --config eng/scripts/test-selection-rules.json \
              --from "${{ github.event.pull_request.base.sha }}" \
              --to "${{ github.event.pull_request.head.sha }}" \
              --github-output \
              --verbose
            echo "::endgroup::"
          else
            echo "::notice::Non-PR event (${{ github.event_name }}) - running all tests"
            echo "run_all=true" >> $GITHUB_OUTPUT
            echo "run_cli_e2e=true" >> $GITHUB_OUTPUT
            echo "run_integrations=true" >> $GITHUB_OUTPUT
            echo "run_extension=true" >> $GITHUB_OUTPUT
            echo "run_polyglot=true" >> $GITHUB_OUTPUT
            echo "affected_test_projects=[]" >> $GITHUB_OUTPUT
          fi

      - name: Apply conditional scope
        id: detect
        shell: bash
        run: |
          # Check if detection step failed - fall back to running all tests
          if [ "${{ steps.detect_raw.outcome }}" != "success" ]; then
            echo "::warning::Test selector failed - falling back to running all tests"
            echo "run_all=true" >> $GITHUB_OUTPUT
            echo "run_integrations=true" >> $GITHUB_OUTPUT
            echo "run_cli_e2e=true" >> $GITHUB_OUTPUT
            echo "run_extension=true" >> $GITHUB_OUTPUT
            echo "run_polyglot=true" >> $GITHUB_OUTPUT
            echo "affected_test_projects=[]" >> $GITHUB_OUTPUT

            echo "## Test Scope - Fallback Mode" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ Test selector tool failed. Running **all tests** as a fallback." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # Read raw detection results and pass through
          echo "run_all=${{ steps.detect_raw.outputs.run_all }}" >> $GITHUB_OUTPUT
          echo "run_integrations=${{ steps.detect_raw.outputs.run_integrations }}" >> $GITHUB_OUTPUT
          echo "run_cli_e2e=${{ steps.detect_raw.outputs.run_cli_e2e }}" >> $GITHUB_OUTPUT
          echo "run_extension=${{ steps.detect_raw.outputs.run_extension }}" >> $GITHUB_OUTPUT
          echo "run_polyglot=${{ steps.detect_raw.outputs.run_polyglot }}" >> $GITHUB_OUTPUT
          echo "affected_test_projects=${{ steps.detect_raw.outputs.affected_test_projects || '[]' }}" >> $GITHUB_OUTPUT

          # Summary
          echo "## Test Scope" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Category | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| run_all | ${{ steps.detect_raw.outputs.run_all || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| integrations | ${{ steps.detect_raw.outputs.run_integrations || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| cli_e2e | ${{ steps.detect_raw.outputs.run_cli_e2e || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| extension | ${{ steps.detect_raw.outputs.run_extension || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| polyglot | ${{ steps.detect_raw.outputs.run_polyglot || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Affected test projects:** ${{ steps.detect_raw.outputs.affected_test_projects || '[]' }}" >> $GITHUB_STEP_SUMMARY

      - name: Show test selection results
        shell: bash
        run: |
          echo "::group::Test Selection Results"
          echo "run_all=${{ steps.detect.outputs.run_all }}"
          echo "run_integrations=${{ steps.detect.outputs.run_integrations }}"
          echo "run_cli_e2e=${{ steps.detect.outputs.run_cli_e2e }}"
          echo "run_extension=${{ steps.detect.outputs.run_extension }}"
          echo "run_polyglot=${{ steps.detect.outputs.run_polyglot }}"
          echo "affected_test_projects=${{ steps.detect.outputs.affected_test_projects }}"
          echo "::endgroup::"

  setup_for_tests:
    name: Setup for tests
    runs-on: ubuntu-latest
    needs: prepare_for_tests
    if: ${{ needs.prepare_for_tests.outputs.all_skipped != 'true' }}
    outputs:
      tests_matrix_no_nugets: ${{ steps.filter_matrix.outputs.tests_matrix_no_nugets }}
      tests_matrix_no_nugets_overflow: ${{ steps.filter_matrix.outputs.tests_matrix_no_nugets_overflow }}
      tests_matrix_requires_nugets: ${{ steps.filter_matrix.outputs.tests_matrix_requires_nugets }}
      tests_matrix_requires_cli_archive: ${{ steps.filter_matrix.outputs.tests_matrix_requires_cli_archive }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: ./.github/actions/enumerate-tests
        id: generate_tests_matrix
        with:
          buildArgs: '/p:IncludeTemplateTests=true /p:IncludeCliE2ETests=${{ github.event_name == ''pull_request'' }}'

      - name: Split matrix by dependency type
        id: split_matrix
        shell: pwsh
        run: |
          $splitScript = "${{ github.workspace }}/eng/scripts/split-test-matrix-by-deps.ps1"
          & $splitScript -AllTestsMatrix '${{ steps.generate_tests_matrix.outputs.all_tests }}' -OutputToGitHubEnv

      - name: Filter matrices by test scope
        id: filter_matrix
        shell: pwsh
        run: |
          $filterScript = "${{ github.workspace }}/eng/scripts/filter-test-matrix-by-scope.ps1"
          $matrices = @{
            'tests_matrix_no_nugets' = '${{ steps.split_matrix.outputs.tests_matrix_no_nugets }}'
            'tests_matrix_no_nugets_overflow' = '${{ steps.split_matrix.outputs.tests_matrix_no_nugets_overflow }}'
            'tests_matrix_requires_nugets' = '${{ steps.split_matrix.outputs.tests_matrix_requires_nugets }}'
            'tests_matrix_requires_cli_archive' = '${{ steps.split_matrix.outputs.tests_matrix_requires_cli_archive }}'
          }
          $runAll = ('${{ needs.prepare_for_tests.outputs.run_all }}' -eq 'true')
          & $filterScript `
            -Matrices $matrices `
            -AffectedProjects '${{ needs.prepare_for_tests.outputs.affected_test_projects }}' `
            -RunAll:$runAll `
            -OutputToGitHubEnv

  build_packages:
    name: Build packages
    needs: prepare_for_tests
    if: ${{ needs.prepare_for_tests.outputs.all_skipped != 'true' }}
    uses: ./.github/workflows/build-packages.yml
    with:
      versionOverrideArg: ${{ needs.prepare_for_tests.outputs.versionOverrideArg }}

  build_cli_archives:
    name: Build native CLI archives
    needs: [prepare_for_tests, build_packages]
    uses: ./.github/workflows/build-cli-native-archives.yml
    with:
      versionOverrideArg: ${{ needs.prepare_for_tests.outputs.versionOverrideArg }}

  tests_no_nugets:
    name: ${{ matrix.shortname }}
    uses: ./.github/workflows/run-tests.yml
    needs: [prepare_for_tests, setup_for_tests]
    if: ${{ fromJson(needs.setup_for_tests.outputs.tests_matrix_no_nugets).include[0] != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup_for_tests.outputs.tests_matrix_no_nugets) }}
    with:
      testShortName: ${{ matrix.shortname }}
      os: ${{ matrix.runs-on }}
      testProjectPath: ${{ matrix.testProjectPath }}
      testSessionTimeout: ${{ matrix.testSessionTimeout }}
      testHangTimeout: ${{ matrix.testHangTimeout }}
      extraTestArgs: "--filter-not-trait \"quarantined=true\" --filter-not-trait \"outerloop=true\" ${{ matrix.extraTestArgs }}"
      versionOverrideArg: ${{ needs.prepare_for_tests.outputs.versionOverrideArg }}
      requiresNugets: ${{ matrix.requiresNugets }}
      requiresTestSdk: ${{ matrix.requiresTestSdk }}

  tests_no_nugets_overflow:
    name: ${{ matrix.shortname }}
    uses: ./.github/workflows/run-tests.yml
    needs: [prepare_for_tests, setup_for_tests]
    if: ${{ fromJson(needs.setup_for_tests.outputs.tests_matrix_no_nugets_overflow).include[0] != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup_for_tests.outputs.tests_matrix_no_nugets_overflow) }}
    with:
      testShortName: ${{ matrix.shortname }}
      os: ${{ matrix.runs-on }}
      testProjectPath: ${{ matrix.testProjectPath }}
      testSessionTimeout: ${{ matrix.testSessionTimeout }}
      testHangTimeout: ${{ matrix.testHangTimeout }}
      extraTestArgs: "--filter-not-trait \"quarantined=true\" --filter-not-trait \"outerloop=true\" ${{ matrix.extraTestArgs }}"
      versionOverrideArg: ${{ needs.prepare_for_tests.outputs.versionOverrideArg }}
      requiresNugets: ${{ matrix.requiresNugets }}
      requiresTestSdk: ${{ matrix.requiresTestSdk }}

  tests_requires_nugets:
    name: ${{ matrix.shortname }}
    uses: ./.github/workflows/run-tests.yml
    needs: [prepare_for_tests, setup_for_tests, build_packages]
    if: ${{ fromJson(needs.setup_for_tests.outputs.tests_matrix_requires_nugets).include[0] != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup_for_tests.outputs.tests_matrix_requires_nugets) }}
    with:
      testShortName: ${{ matrix.shortname }}
      os: ${{ matrix.runs-on }}
      testProjectPath: ${{ matrix.testProjectPath }}
      testSessionTimeout: ${{ matrix.testSessionTimeout }}
      testHangTimeout: ${{ matrix.testHangTimeout }}
      extraTestArgs: "--filter-not-trait \"quarantined=true\" --filter-not-trait \"outerloop=true\" ${{ matrix.extraTestArgs }}"
      versionOverrideArg: ${{ needs.prepare_for_tests.outputs.versionOverrideArg }}
      requiresNugets: ${{ matrix.requiresNugets }}
      requiresTestSdk: ${{ matrix.requiresTestSdk }}

  tests_requires_cli_archive:
    name: ${{ matrix.shortname }}
    uses: ./.github/workflows/run-tests.yml
    needs: [prepare_for_tests, setup_for_tests, build_packages, build_cli_archives]
    if: ${{ fromJson(needs.setup_for_tests.outputs.tests_matrix_requires_cli_archive).include[0] != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup_for_tests.outputs.tests_matrix_requires_cli_archive) }}
    with:
      testShortName: ${{ matrix.shortname }}
      os: ${{ matrix.runs-on }}
      testProjectPath: ${{ matrix.testProjectPath }}
      testSessionTimeout: ${{ matrix.testSessionTimeout }}
      testHangTimeout: ${{ matrix.testHangTimeout }}
      extraTestArgs: "--filter-not-trait \"quarantined=true\" --filter-not-trait \"outerloop=true\" ${{ matrix.extraTestArgs }}"
      versionOverrideArg: ${{ needs.prepare_for_tests.outputs.versionOverrideArg }}
      requiresNugets: ${{ matrix.requiresNugets }}
      requiresTestSdk: ${{ matrix.requiresTestSdk }}
      requiresCliArchive: true

  polyglot_validation:
    name: Polyglot SDK Validation
    uses: ./.github/workflows/polyglot-validation.yml
    needs: [prepare_for_tests, build_packages, build_cli_archives]
    if: |
      needs.prepare_for_tests.outputs.run_all == 'true' ||
      needs.prepare_for_tests.outputs.run_polyglot == 'true'
    with:
      versionOverrideArg: ${{ needs.prepare_for_tests.outputs.versionOverrideArg }}

  extension_tests_win:
    name: Run VS Code extension tests (Windows)
    runs-on: windows-latest
    needs: prepare_for_tests
    if: |
      needs.prepare_for_tests.outputs.run_all == 'true' ||
      needs.prepare_for_tests.outputs.run_extension == 'true'
    defaults:
      run:
        working-directory: ./extension
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Setup Node.js environment
        uses: actions/setup-node@v2
        with:
          node-version: '20.x'
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test
      - name: Package VSIX
        run: npm exec @vscode/vsce -- package --pre-release -o out/aspire-extension.vsix
      - name: Upload VSIX
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: aspire-extension
          path: extension/out/aspire-extension.vsix

  results:
    if: ${{ always() && github.repository_owner == 'dotnet' }}
    runs-on: ubuntu-latest
    name: Final Test Results
    needs: [
      prepare_for_tests,
      setup_for_tests,
      build_packages,
      build_cli_archives,
      extension_tests_win,
      tests_no_nugets,
      tests_no_nugets_overflow,
      tests_requires_nugets,
      tests_requires_cli_archive,
      polyglot_validation,
    ]
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          pattern: logs-*-ubuntu-latest
          merge-multiple: true
          path: ${{ github.workspace }}/testresults/ubuntu-latest

      - uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          pattern: logs-*-windows-latest
          merge-multiple: true
          path: ${{ github.workspace }}/testresults/windows-latest

      - uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          pattern: logs-*-macos-latest
          merge-multiple: true
          path: testresults/macos-latest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: All-TestResults
          path: ${{ github.workspace }}/testresults/**/*.trx

      - name: Compute infra timing and dependency map
        id: infra_timing
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          MATRICES_NO_NUGETS: ${{ needs.setup_for_tests.outputs.tests_matrix_no_nugets }}
          MATRICES_NO_NUGETS_OVERFLOW: ${{ needs.setup_for_tests.outputs.tests_matrix_no_nugets_overflow }}
          MATRICES_REQUIRES_NUGETS: ${{ needs.setup_for_tests.outputs.tests_matrix_requires_nugets }}
          MATRICES_REQUIRES_CLI_ARCHIVE: ${{ needs.setup_for_tests.outputs.tests_matrix_requires_cli_archive }}
        run: |
          set -euo pipefail

          DEP_MAP_FILE="${{ github.workspace }}/testresults/dep-map.json"

          # Generate dependency map from matrix outputs
          python3 - <<'PYTHON_SCRIPT' "$DEP_MAP_FILE"
          import json, os, sys

          dep_map = {}
          matrices = [
              ("no_nugets", "MATRICES_NO_NUGETS"),
              ("no_nugets", "MATRICES_NO_NUGETS_OVERFLOW"),
              ("requires_nugets", "MATRICES_REQUIRES_NUGETS"),
              ("requires_cli_archive", "MATRICES_REQUIRES_CLI_ARCHIVE"),
          ]

          for bucket, env_var in matrices:
              matrix_json = os.environ.get(env_var, "{}")
              try:
                  matrix = json.loads(matrix_json) if matrix_json else {}
              except json.JSONDecodeError:
                  continue
              for entry in matrix.get("include", []):
                  shortname = entry.get("shortname", "")
                  if shortname:
                      dep_map[shortname] = bucket

          output_path = sys.argv[1]
          with open(output_path, "w") as f:
              json.dump(dep_map, f, indent=2)
          print(f"Dependency map: {len(dep_map)} entries written to {output_path}")
          PYTHON_SCRIPT

          # Query GitHub API for build job timings
          NUGET_MINUTES=0
          CLI_MINUTES=0

          JOBS_JSON=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --paginate --jq '.jobs[] | {name, started_at, completed_at}')

          # Extract build_packages timing (the main Build packages job)
          BUILD_PKG_START=$(echo "$JOBS_JSON" | jq -r 'select(.name | test("Build packages / Build packages$")) | .started_at' | head -1)
          # End time = latest upload_arch_specific_nugets completion
          BUILD_PKG_END=$(echo "$JOBS_JSON" | jq -r 'select(.name | test("Upload arch-specific")) | .completed_at' | sort | tail -1)

          if [ -z "$BUILD_PKG_END" ] || [ "$BUILD_PKG_END" = "null" ]; then
            BUILD_PKG_END=$(echo "$JOBS_JSON" | jq -r 'select(.name | test("Build packages / Build packages$")) | .completed_at' | head -1)
          fi

          if [ -n "$BUILD_PKG_START" ] && [ "$BUILD_PKG_START" != "null" ] && [ -n "$BUILD_PKG_END" ] && [ "$BUILD_PKG_END" != "null" ]; then
            START_EPOCH=$(date -d "$BUILD_PKG_START" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$BUILD_PKG_START" +%s 2>/dev/null || echo 0)
            END_EPOCH=$(date -d "$BUILD_PKG_END" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$BUILD_PKG_END" +%s 2>/dev/null || echo 0)
            if [ "$START_EPOCH" -gt 0 ] && [ "$END_EPOCH" -gt 0 ]; then
              NUGET_MINUTES=$(python3 -c "print(round(($END_EPOCH - $START_EPOCH) / 60, 1))")
            fi
          fi

          # Extract CLI archive timing (max across all Build CLI jobs)
          CLI_START=$(echo "$JOBS_JSON" | jq -r 'select(.name | test("Build CLI")) | .started_at' | sort | head -1)
          CLI_END=$(echo "$JOBS_JSON" | jq -r 'select(.name | test("Build CLI")) | .completed_at' | sort | tail -1)

          if [ -n "$CLI_START" ] && [ "$CLI_START" != "null" ] && [ -n "$CLI_END" ] && [ "$CLI_END" != "null" ]; then
            START_EPOCH=$(date -d "$CLI_START" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$CLI_START" +%s 2>/dev/null || echo 0)
            END_EPOCH=$(date -d "$CLI_END" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$CLI_END" +%s 2>/dev/null || echo 0)
            if [ "$START_EPOCH" -gt 0 ] && [ "$END_EPOCH" -gt 0 ]; then
              CLI_MINUTES=$(python3 -c "print(round(($END_EPOCH - $START_EPOCH) / 60, 1))")
            fi
          fi

          echo "nuget_build_minutes=$NUGET_MINUTES" >> $GITHUB_OUTPUT
          echo "cli_build_minutes=$CLI_MINUTES" >> $GITHUB_OUTPUT
          echo "dep_map_file=$DEP_MAP_FILE" >> $GITHUB_OUTPUT

          echo "Infrastructure timing: NuGet=${NUGET_MINUTES}m, CLI=${CLI_MINUTES}m"

      - name: Generate test results summary
        if: always()
        shell: bash
        run: |
          EXTRA_ARGS=""
          NUGET_MINS="${{ steps.infra_timing.outputs.nuget_build_minutes }}"
          CLI_MINS="${{ steps.infra_timing.outputs.cli_build_minutes }}"
          DEP_MAP="${{ steps.infra_timing.outputs.dep_map_file }}"

          if [ -n "$DEP_MAP" ] && [ -f "$DEP_MAP" ]; then
            EXTRA_ARGS="--nuget-build-minutes ${NUGET_MINS:-0} --cli-build-minutes ${CLI_MINS:-0} --test-dep-map $DEP_MAP"
          fi

          ${{ github.workspace }}/dotnet.sh \
            run \
            --project ${{ github.workspace }}/tools/GenerateTestSummary/GenerateTestSummary.csproj \
            -- \
            ${{ github.workspace }}/testresults \
            --combined \
            $EXTRA_ARGS

      - name: Fail if any dependency failed
        # 'skipped' can be when a transitive dependency fails and the dependent job gets 'skipped'.
        # For example, one of setup_* jobs failing and the dependent test jobs getting 'skipped'.
        # Overflow jobs are intentionally skipped when below the overflow threshold.
        # Jobs may also be legitimately skipped when prepare_for_tests determines they're not needed.
        if: >-
          ${{ always() &&
              (contains(needs.*.result, 'failure') ||
               contains(needs.*.result, 'cancelled') ||
               (needs.prepare_for_tests.outputs.all_skipped != 'true' &&
                github.event_name == 'pull_request' &&
                (needs.tests_no_nugets.result == 'skipped' ||
                 needs.tests_requires_nugets.result == 'skipped' ||
                 needs.tests_requires_cli_archive.result == 'skipped' ||
                 (needs.prepare_for_tests.outputs.run_extension == 'true' && needs.extension_tests_win.result == 'skipped') ||
                 (needs.prepare_for_tests.outputs.run_polyglot == 'true' && needs.polyglot_validation.result == 'skipped'))) ||
               (github.event_name != 'pull_request' &&
                (needs.tests_no_nugets.result == 'skipped' ||
                 needs.tests_requires_nugets.result == 'skipped' ||
                 (needs.prepare_for_tests.outputs.run_extension == 'true' && needs.extension_tests_win.result == 'skipped') ||
                 (needs.prepare_for_tests.outputs.run_polyglot == 'true' && needs.polyglot_validation.result == 'skipped')))) }}
        run: |
          echo "One or more dependent jobs failed."
          exit 1
