# Executes all the tests on all the platforms
name: Tests

on:
  workflow_call:
    inputs:
      versionOverrideArg:
        required: false
        type: string

jobs:
  setup_for_tests:
    name: Setup for tests
    runs-on: ubuntu-latest
    outputs:
      tests_matrix_no_nugets: ${{ steps.split_matrix.outputs.tests_matrix_no_nugets }}
      tests_matrix_no_nugets_overflow: ${{ steps.split_matrix.outputs.tests_matrix_no_nugets_overflow }}
      tests_matrix_requires_nugets: ${{ steps.split_matrix.outputs.tests_matrix_requires_nugets }}
      tests_matrix_requires_cli_archive: ${{ steps.split_matrix.outputs.tests_matrix_requires_cli_archive }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: ./.github/actions/enumerate-tests
        id: generate_tests_matrix
        with:
          buildArgs: '/p:IncludeTemplateTests=true /p:IncludeCliE2ETests=${{ github.event_name == ''pull_request'' }}'

      - name: Split matrix by dependency type
        id: split_matrix
        shell: pwsh
        run: |
          $splitScript = "${{ github.workspace }}/eng/scripts/split-test-matrix-by-deps.ps1"
          & $splitScript -AllTestsMatrix '${{ steps.generate_tests_matrix.outputs.all_tests }}' -OutputToGitHubEnv

  build_packages:
    name: Build packages
    uses: ./.github/workflows/build-packages.yml
    with:
      versionOverrideArg: ${{ inputs.versionOverrideArg }}

  build_cli_archive_linux:
    name: Build native CLI archive (Linux)
    uses: ./.github/workflows/build-cli-native-archives.yml
    with:
      versionOverrideArg: ${{ inputs.versionOverrideArg }}
      targets: '[{"os": "ubuntu-latest", "runner": "8-core-ubuntu-latest", "rids": "linux-x64"}]'

  build_cli_archives_other:
    name: Build native CLI archives (Windows, macOS)
    uses: ./.github/workflows/build-cli-native-archives.yml
    with:
      versionOverrideArg: ${{ inputs.versionOverrideArg }}
      targets: '[{"os": "windows-latest", "runner": "windows-latest", "rids": "win-x64"}, {"os": "macos-latest", "runner": "macos-latest", "rids": "osx-arm64"}]'

  tests_no_nugets:
    name: ${{ matrix.shortname }}
    uses: ./.github/workflows/run-tests.yml
    needs: setup_for_tests
    if: ${{ fromJson(needs.setup_for_tests.outputs.tests_matrix_no_nugets).include[0] != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup_for_tests.outputs.tests_matrix_no_nugets) }}
    with:
      testShortName: ${{ matrix.shortname }}
      os: ${{ matrix.runs-on }}
      testProjectPath: ${{ matrix.testProjectPath }}
      testSessionTimeout: ${{ matrix.testSessionTimeout }}
      testHangTimeout: ${{ matrix.testHangTimeout }}
      extraTestArgs: "--filter-not-trait \"quarantined=true\" --filter-not-trait \"outerloop=true\" ${{ matrix.extraTestArgs }}"
      versionOverrideArg: ${{ inputs.versionOverrideArg }}
      requiresNugets: ${{ matrix.requiresNugets }}
      requiresTestSdk: ${{ matrix.requiresTestSdk }}

  tests_no_nugets_overflow:
    name: ${{ matrix.shortname }}
    uses: ./.github/workflows/run-tests.yml
    needs: setup_for_tests
    if: ${{ fromJson(needs.setup_for_tests.outputs.tests_matrix_no_nugets_overflow).include[0] != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup_for_tests.outputs.tests_matrix_no_nugets_overflow) }}
    with:
      testShortName: ${{ matrix.shortname }}
      os: ${{ matrix.runs-on }}
      testProjectPath: ${{ matrix.testProjectPath }}
      testSessionTimeout: ${{ matrix.testSessionTimeout }}
      testHangTimeout: ${{ matrix.testHangTimeout }}
      extraTestArgs: "--filter-not-trait \"quarantined=true\" --filter-not-trait \"outerloop=true\" ${{ matrix.extraTestArgs }}"
      versionOverrideArg: ${{ inputs.versionOverrideArg }}
      requiresNugets: ${{ matrix.requiresNugets }}
      requiresTestSdk: ${{ matrix.requiresTestSdk }}

  tests_requires_nugets:
    name: ${{ matrix.shortname }}
    uses: ./.github/workflows/run-tests.yml
    needs: [setup_for_tests, build_packages, build_cli_archive_linux]
    if: ${{ fromJson(needs.setup_for_tests.outputs.tests_matrix_requires_nugets).include[0] != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup_for_tests.outputs.tests_matrix_requires_nugets) }}
    with:
      testShortName: ${{ matrix.shortname }}
      os: ${{ matrix.runs-on }}
      testProjectPath: ${{ matrix.testProjectPath }}
      testSessionTimeout: ${{ matrix.testSessionTimeout }}
      testHangTimeout: ${{ matrix.testHangTimeout }}
      extraTestArgs: "--filter-not-trait \"quarantined=true\" --filter-not-trait \"outerloop=true\" ${{ matrix.extraTestArgs }}"
      versionOverrideArg: ${{ inputs.versionOverrideArg }}
      requiresNugets: ${{ matrix.requiresNugets }}
      requiresTestSdk: ${{ matrix.requiresTestSdk }}

  tests_requires_cli_archive:
    name: ${{ matrix.shortname }}
    uses: ./.github/workflows/run-tests.yml
    needs: [setup_for_tests, build_packages, build_cli_archive_linux]
    if: ${{ fromJson(needs.setup_for_tests.outputs.tests_matrix_requires_cli_archive).include[0] != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup_for_tests.outputs.tests_matrix_requires_cli_archive) }}
    with:
      testShortName: ${{ matrix.shortname }}
      os: ${{ matrix.runs-on }}
      testProjectPath: ${{ matrix.testProjectPath }}
      testSessionTimeout: ${{ matrix.testSessionTimeout }}
      testHangTimeout: ${{ matrix.testHangTimeout }}
      extraTestArgs: "--filter-not-trait \"quarantined=true\" --filter-not-trait \"outerloop=true\" ${{ matrix.extraTestArgs }}"
      versionOverrideArg: ${{ inputs.versionOverrideArg }}
      requiresNugets: ${{ matrix.requiresNugets }}
      requiresTestSdk: ${{ matrix.requiresTestSdk }}
      requiresCliArchive: true

  polyglot_validation:
    name: Polyglot SDK Validation
    uses: ./.github/workflows/polyglot-validation.yml
    needs: [build_packages, build_cli_archive_linux]
    with:
      versionOverrideArg: ${{ inputs.versionOverrideArg }}

  extension_tests_win:
    name: Run VS Code extension tests (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./extension
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Setup Node.js environment
        uses: actions/setup-node@v2
        with:
          node-version: '20.x'
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test
      - name: Package VSIX
        run: npm exec @vscode/vsce -- package --pre-release -o out/aspire-extension.vsix
      - name: Upload VSIX
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: aspire-extension
          path: extension/out/aspire-extension.vsix

  results:
    if: ${{ always() && github.repository_owner == 'dotnet' }}
    runs-on: ubuntu-latest
    name: Final Test Results
    needs: [
      setup_for_tests,
      build_packages,
      build_cli_archive_linux,
      build_cli_archives_other,
      extension_tests_win,
      tests_no_nugets,
      tests_no_nugets_overflow,
      tests_requires_nugets,
      tests_requires_cli_archive,
      polyglot_validation,
    ]
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          pattern: logs-*-ubuntu-latest
          merge-multiple: true
          path: ${{ github.workspace }}/testresults/ubuntu-latest

      - uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          pattern: logs-*-windows-latest
          merge-multiple: true
          path: ${{ github.workspace }}/testresults/windows-latest

      - uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          pattern: logs-*-macos-latest
          merge-multiple: true
          path: testresults/macos-latest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: All-TestResults
          path: ${{ github.workspace }}/testresults/**/*.trx

      - name: Compute infra timing and dependency map
        id: infra_timing
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          MATRICES_NO_NUGETS: ${{ needs.setup_for_tests.outputs.tests_matrix_no_nugets }}
          MATRICES_NO_NUGETS_OVERFLOW: ${{ needs.setup_for_tests.outputs.tests_matrix_no_nugets_overflow }}
          MATRICES_REQUIRES_NUGETS: ${{ needs.setup_for_tests.outputs.tests_matrix_requires_nugets }}
          MATRICES_REQUIRES_CLI_ARCHIVE: ${{ needs.setup_for_tests.outputs.tests_matrix_requires_cli_archive }}
        run: |
          set -euo pipefail

          DEP_MAP_FILE="${{ github.workspace }}/testresults/dep-map.json"

          # Generate dependency map from matrix outputs
          python3 - <<'PYTHON_SCRIPT' "$DEP_MAP_FILE"
          import json, os, sys

          dep_map = {}
          matrices = [
              ("no_nugets", "MATRICES_NO_NUGETS"),
              ("no_nugets", "MATRICES_NO_NUGETS_OVERFLOW"),
              ("requires_nugets", "MATRICES_REQUIRES_NUGETS"),
              ("requires_cli_archive", "MATRICES_REQUIRES_CLI_ARCHIVE"),
          ]

          for bucket, env_var in matrices:
              matrix_json = os.environ.get(env_var, "{}")
              try:
                  matrix = json.loads(matrix_json) if matrix_json else {}
              except json.JSONDecodeError:
                  continue
              for entry in matrix.get("include", []):
                  shortname = entry.get("shortname", "")
                  if shortname:
                      dep_map[shortname] = bucket

          output_path = sys.argv[1]
          with open(output_path, "w") as f:
              json.dump(dep_map, f, indent=2)
          print(f"Dependency map: {len(dep_map)} entries written to {output_path}")
          PYTHON_SCRIPT

          # Query GitHub API for build job timings
          NUGET_MINUTES=0
          CLI_MINUTES=0

          JOBS_JSON=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" --paginate --jq '.jobs[] | {name, started_at, completed_at}')

          # Extract build_packages timing (the main Build packages job)
          BUILD_PKG_START=$(echo "$JOBS_JSON" | jq -r 'select(.name | test("Build packages / Build packages$")) | .started_at' | head -1)
          # End time = latest upload_arch_specific_nugets completion
          BUILD_PKG_END=$(echo "$JOBS_JSON" | jq -r 'select(.name | test("Upload arch-specific")) | .completed_at' | sort | tail -1)

          if [ -z "$BUILD_PKG_END" ] || [ "$BUILD_PKG_END" = "null" ]; then
            BUILD_PKG_END=$(echo "$JOBS_JSON" | jq -r 'select(.name | test("Build packages / Build packages$")) | .completed_at' | head -1)
          fi

          if [ -n "$BUILD_PKG_START" ] && [ "$BUILD_PKG_START" != "null" ] && [ -n "$BUILD_PKG_END" ] && [ "$BUILD_PKG_END" != "null" ]; then
            START_EPOCH=$(date -d "$BUILD_PKG_START" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$BUILD_PKG_START" +%s 2>/dev/null || echo 0)
            END_EPOCH=$(date -d "$BUILD_PKG_END" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$BUILD_PKG_END" +%s 2>/dev/null || echo 0)
            if [ "$START_EPOCH" -gt 0 ] && [ "$END_EPOCH" -gt 0 ]; then
              NUGET_MINUTES=$(python3 -c "print(round(($END_EPOCH - $START_EPOCH) / 60, 1))")
            fi
          fi

          # Extract CLI archive timing (max across all Build CLI jobs)
          CLI_START=$(echo "$JOBS_JSON" | jq -r 'select(.name | test("Build CLI")) | .started_at' | sort | head -1)
          CLI_END=$(echo "$JOBS_JSON" | jq -r 'select(.name | test("Build CLI")) | .completed_at' | sort | tail -1)

          if [ -n "$CLI_START" ] && [ "$CLI_START" != "null" ] && [ -n "$CLI_END" ] && [ "$CLI_END" != "null" ]; then
            START_EPOCH=$(date -d "$CLI_START" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$CLI_START" +%s 2>/dev/null || echo 0)
            END_EPOCH=$(date -d "$CLI_END" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "$CLI_END" +%s 2>/dev/null || echo 0)
            if [ "$START_EPOCH" -gt 0 ] && [ "$END_EPOCH" -gt 0 ]; then
              CLI_MINUTES=$(python3 -c "print(round(($END_EPOCH - $START_EPOCH) / 60, 1))")
            fi
          fi

          echo "nuget_build_minutes=$NUGET_MINUTES" >> $GITHUB_OUTPUT
          echo "cli_build_minutes=$CLI_MINUTES" >> $GITHUB_OUTPUT
          echo "dep_map_file=$DEP_MAP_FILE" >> $GITHUB_OUTPUT

          echo "Infrastructure timing: NuGet=${NUGET_MINUTES}m, CLI=${CLI_MINUTES}m"

      - name: Generate test results summary
        if: always()
        shell: bash
        run: |
          EXTRA_ARGS=""
          NUGET_MINS="${{ steps.infra_timing.outputs.nuget_build_minutes }}"
          CLI_MINS="${{ steps.infra_timing.outputs.cli_build_minutes }}"
          DEP_MAP="${{ steps.infra_timing.outputs.dep_map_file }}"

          if [ -n "$DEP_MAP" ] && [ -f "$DEP_MAP" ]; then
            EXTRA_ARGS="--nuget-build-minutes ${NUGET_MINS:-0} --cli-build-minutes ${CLI_MINS:-0} --test-dep-map $DEP_MAP"
          fi

          ${{ github.workspace }}/dotnet.sh \
            run \
            --project ${{ github.workspace }}/tools/GenerateTestSummary/GenerateTestSummary.csproj \
            -- \
            ${{ github.workspace }}/testresults \
            --combined \
            $EXTRA_ARGS

      - name: Fail if any dependency failed
        # 'skipped' can be when a transitive dependency fails and the dependent job gets 'skipped'.
        # For example, one of setup_* jobs failing and the dependent test jobs getting 'skipped'.
        # Overflow jobs are intentionally skipped when below the overflow threshold, so we
        # check specific job names rather than using contains(needs.*.result, 'skipped').
        if: >-
          ${{ always() &&
              (contains(needs.*.result, 'failure') ||
               contains(needs.*.result, 'cancelled') ||
               (github.event_name == 'pull_request' &&
                (needs.extension_tests_win.result == 'skipped' ||
                 needs.tests_no_nugets.result == 'skipped' ||
                 needs.tests_requires_nugets.result == 'skipped' ||
                 needs.tests_requires_cli_archive.result == 'skipped' ||
                 needs.polyglot_validation.result == 'skipped')) ||
               (github.event_name != 'pull_request' &&
                (needs.extension_tests_win.result == 'skipped' ||
                 needs.tests_no_nugets.result == 'skipped' ||
                 needs.tests_requires_nugets.result == 'skipped' ||
                 needs.polyglot_validation.result == 'skipped'))) }}
        run: |
          echo "One or more dependent jobs failed."
          exit 1
