# Executes all the tests on all the platforms
name: Tests

on:
  workflow_call:
    inputs:
      versionOverrideArg:
        required: false
        type: string

jobs:
  setup_for_tests:
    name: Setup for tests
    runs-on: ubuntu-latest
    outputs:
      run_all: ${{ steps.detect.outputs.run_all }}
      run_extension: ${{ steps.detect.outputs.run_extension }}
      run_polyglot: ${{ steps.detect.outputs.run_polyglot }}
      affected_test_projects: ${{ steps.detect.outputs.affected_test_projects }}
      tests_matrix_no_nugets: ${{ steps.filter_matrix.outputs.tests_matrix_no_nugets }}
      tests_matrix_no_nugets_overflow: ${{ steps.filter_matrix.outputs.tests_matrix_no_nugets_overflow }}
      tests_matrix_requires_nugets_linux: ${{ steps.filter_matrix.outputs.tests_matrix_requires_nugets_linux }}
      tests_matrix_requires_nugets_windows: ${{ steps.filter_matrix.outputs.tests_matrix_requires_nugets_windows }}
      tests_matrix_requires_nugets_macos: ${{ steps.filter_matrix.outputs.tests_matrix_requires_nugets_macos }}
      tests_matrix_requires_cli_archive: ${{ steps.filter_matrix.outputs.tests_matrix_requires_cli_archive }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Restore local SDK
        if: ${{ github.event_name == 'pull_request' }}
        run: ./restore.sh

      - name: Install dotnet-affected
        if: ${{ github.event_name == 'pull_request' }}
        run: ./dotnet.sh tool install --global dotnet-affected --version 6.2.0-preview-1

      - name: Evaluate changed paths (active selector)
        id: detect_active_raw
        continue-on-error: true
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            mkdir -p "${{ github.workspace }}/artifacts/test-selection"
            echo "::group::Running active test selector"
            ./dotnet.sh run --project tools/TestSelector/TestSelector.csproj -- \
              --solution Aspire.slnx \
              --config eng/scripts/test-selection-rules.json \
              --from "${{ github.event.pull_request.base.sha }}" \
              --to "${{ github.event.pull_request.head.sha }}" \
              --output "${{ github.workspace }}/artifacts/test-selection/selector-active.json" \
              --github-output \
              --verbose
            echo "::endgroup::"
          else
            echo "::notice::Non-PR event (${{ github.event_name }}) - running all tests"
            echo "run_all=true" >> $GITHUB_OUTPUT
            echo "run_cli_e2e=true" >> $GITHUB_OUTPUT
            echo "run_integrations=true" >> $GITHUB_OUTPUT
            echo "run_extension=true" >> $GITHUB_OUTPUT
            echo "run_polyglot=true" >> $GITHUB_OUTPUT
            echo "affected_test_projects=[]" >> $GITHUB_OUTPUT
            echo "selection_reason=non_pr_event" >> $GITHUB_OUTPUT
          fi

      - name: Evaluate changed paths (audit selector)
        id: detect_audit_raw
        continue-on-error: true
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            mkdir -p "${{ github.workspace }}/artifacts/test-selection"
            echo "::group::Running audit test selector"
            ./dotnet.sh run --project tools/TestSelector/TestSelector.csproj -- \
              --solution Aspire.slnx \
              --config eng/scripts/test-selection-rules.audit.json \
              --non-applying-paths "eng/scripts/test-selection-rules.audit.json" \
              --from "${{ github.event.pull_request.base.sha }}" \
              --to "${{ github.event.pull_request.head.sha }}" \
              --output "${{ github.workspace }}/artifacts/test-selection/selector-audit.json" \
              --github-output \
              --verbose
            echo "::endgroup::"
          else
            echo "run_all=true" >> $GITHUB_OUTPUT
            echo "run_cli_e2e=true" >> $GITHUB_OUTPUT
            echo "run_integrations=true" >> $GITHUB_OUTPUT
            echo "run_extension=true" >> $GITHUB_OUTPUT
            echo "run_polyglot=true" >> $GITHUB_OUTPUT
            echo "affected_test_projects=[]" >> $GITHUB_OUTPUT
            echo "selection_reason=non_pr_event" >> $GITHUB_OUTPUT
          fi

      - name: Apply conditional scope
        id: detect
        shell: bash
        run: |
          normalize_bool() {
            if [ "$1" = "true" ]; then
              echo "true"
            else
              echo "false"
            fi
          }

          normalize_json_array() {
            if [ -n "$1" ]; then
              echo "$1"
            else
              echo "[]"
            fi
          }

          if [ "${{ steps.detect_active_raw.outcome }}" != "success" ]; then
            echo "::warning::Test selector failed - falling back to running all tests"
            echo "run_all=true" >> $GITHUB_OUTPUT
            echo "run_integrations=true" >> $GITHUB_OUTPUT
            echo "run_cli_e2e=true" >> $GITHUB_OUTPUT
            echo "run_extension=true" >> $GITHUB_OUTPUT
            echo "run_polyglot=true" >> $GITHUB_OUTPUT
            echo "affected_test_projects=[]" >> $GITHUB_OUTPUT
            echo "default_coverage_projects=[]" >> $GITHUB_OUTPUT

            echo "<details><summary>Test Scope Selection</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Test Scope - Fallback Mode" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ Active test selector failed. Running **all tests** as a fallback." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "## Audit Selector Observation" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              if [ "${{ steps.detect_audit_raw.outcome }}" = "success" ]; then
                AUDIT_RUN_ALL="$(normalize_bool "${{ steps.detect_audit_raw.outputs.run_all }}")"
                AUDIT_RUN_INTEGRATIONS="$(normalize_bool "${{ steps.detect_audit_raw.outputs.run_integrations }}")"
                AUDIT_RUN_CLI_E2E="$(normalize_bool "${{ steps.detect_audit_raw.outputs.run_cli_e2e }}")"
                AUDIT_RUN_EXTENSION="$(normalize_bool "${{ steps.detect_audit_raw.outputs.run_extension }}")"
                AUDIT_RUN_POLYGLOT="$(normalize_bool "${{ steps.detect_audit_raw.outputs.run_polyglot }}")"
                AUDIT_AFFECTED="$(normalize_json_array "${{ steps.detect_audit_raw.outputs.affected_test_projects }}")"
                AUDIT_REASON="${{ steps.detect_audit_raw.outputs.selection_reason }}"
                if [ -z "$AUDIT_REASON" ]; then
                  AUDIT_REASON="unknown"
                fi

                echo "Audit selector still completed and produced observational data." >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "- Reason: \`$AUDIT_REASON\`" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "| Category | Detected | Mode |" >> $GITHUB_STEP_SUMMARY
                echo "|----------|----------|------|" >> $GITHUB_STEP_SUMMARY
                echo "| run_all | ${AUDIT_RUN_ALL} | Audit |" >> $GITHUB_STEP_SUMMARY
                echo "| integrations | ${AUDIT_RUN_INTEGRATIONS} | Audit |" >> $GITHUB_STEP_SUMMARY
                echo "| cli_e2e | ${AUDIT_RUN_CLI_E2E} | Audit |" >> $GITHUB_STEP_SUMMARY
                echo "| extension | ${AUDIT_RUN_EXTENSION} | Audit |" >> $GITHUB_STEP_SUMMARY
                echo "| polyglot | ${AUDIT_RUN_POLYGLOT} | Audit |" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "**Audit selector affected test projects:** ${AUDIT_AFFECTED}" >> $GITHUB_STEP_SUMMARY
              else
                echo "⚠️ Audit selector did not produce observational data." >> $GITHUB_STEP_SUMMARY
              fi
              echo "" >> $GITHUB_STEP_SUMMARY
            fi

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          ACTIVE_RUN_ALL="$(normalize_bool "${{ steps.detect_active_raw.outputs.run_all }}")"
          ACTIVE_RUN_INTEGRATIONS="$(normalize_bool "${{ steps.detect_active_raw.outputs.run_integrations }}")"
          ACTIVE_RUN_CLI_E2E="$(normalize_bool "${{ steps.detect_active_raw.outputs.run_cli_e2e }}")"
          ACTIVE_RUN_EXTENSION="$(normalize_bool "${{ steps.detect_active_raw.outputs.run_extension }}")"
          ACTIVE_RUN_POLYGLOT="$(normalize_bool "${{ steps.detect_active_raw.outputs.run_polyglot }}")"
          ACTIVE_AFFECTED="$(normalize_json_array "${{ steps.detect_active_raw.outputs.affected_test_projects }}")"
          ACTIVE_REASON="${{ steps.detect_active_raw.outputs.selection_reason }}"
          if [ -z "$ACTIVE_REASON" ]; then
            ACTIVE_REASON="unknown"
          fi
          DEFAULT_COVERAGE='[]'

          if [ "${ACTIVE_RUN_ALL}" != "true" ] && [ "${ACTIVE_RUN_INTEGRATIONS}" == "true" ] && [ "${ACTIVE_AFFECTED}" == "[]" ]; then
            DEFAULT_COVERAGE='["tests/Aspire.Templates.Tests/Aspire.Templates.Tests.csproj"]'
          fi

          echo "run_all=${ACTIVE_RUN_ALL}" >> $GITHUB_OUTPUT
          echo "run_integrations=${ACTIVE_RUN_INTEGRATIONS}" >> $GITHUB_OUTPUT
          echo "run_cli_e2e=${ACTIVE_RUN_CLI_E2E}" >> $GITHUB_OUTPUT
          echo "run_extension=${ACTIVE_RUN_EXTENSION}" >> $GITHUB_OUTPUT
          echo "run_polyglot=${ACTIVE_RUN_POLYGLOT}" >> $GITHUB_OUTPUT
          echo "affected_test_projects=${ACTIVE_AFFECTED}" >> $GITHUB_OUTPUT
          echo "default_coverage_projects=${DEFAULT_COVERAGE}" >> $GITHUB_OUTPUT

          echo "<details><summary>Test Scope Selection</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Active Test Selection" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Conditional scope is **applied** to category and matrix selection." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Reason: \`$ACTIVE_REASON\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Category | Detected | Applied | Mode |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|----------|---------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| run_all | ${ACTIVE_RUN_ALL} | ${ACTIVE_RUN_ALL} | - |" >> $GITHUB_STEP_SUMMARY
          echo "| integrations | ${ACTIVE_RUN_INTEGRATIONS} | ${ACTIVE_RUN_INTEGRATIONS} | Applied |" >> $GITHUB_STEP_SUMMARY
          echo "| cli_e2e | ${ACTIVE_RUN_CLI_E2E} | ${ACTIVE_RUN_CLI_E2E} | Applied |" >> $GITHUB_STEP_SUMMARY
          echo "| extension | ${ACTIVE_RUN_EXTENSION} | ${ACTIVE_RUN_EXTENSION} | Applied |" >> $GITHUB_STEP_SUMMARY
          echo "| polyglot | ${ACTIVE_RUN_POLYGLOT} | ${ACTIVE_RUN_POLYGLOT} | Applied |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Affected test projects:** ${ACTIVE_AFFECTED}" >> $GITHUB_STEP_SUMMARY
          echo "**Default coverage test projects:** ${DEFAULT_COVERAGE}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "## Audit Selector Observation" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            if [ "${{ steps.detect_audit_raw.outcome }}" = "success" ]; then
              AUDIT_RUN_ALL="$(normalize_bool "${{ steps.detect_audit_raw.outputs.run_all }}")"
              AUDIT_RUN_INTEGRATIONS="$(normalize_bool "${{ steps.detect_audit_raw.outputs.run_integrations }}")"
              AUDIT_RUN_CLI_E2E="$(normalize_bool "${{ steps.detect_audit_raw.outputs.run_cli_e2e }}")"
              AUDIT_RUN_EXTENSION="$(normalize_bool "${{ steps.detect_audit_raw.outputs.run_extension }}")"
              AUDIT_RUN_POLYGLOT="$(normalize_bool "${{ steps.detect_audit_raw.outputs.run_polyglot }}")"
              AUDIT_AFFECTED="$(normalize_json_array "${{ steps.detect_audit_raw.outputs.affected_test_projects }}")"
              AUDIT_REASON="${{ steps.detect_audit_raw.outputs.selection_reason }}"
              if [ -z "$AUDIT_REASON" ]; then
                AUDIT_REASON="unknown"
              fi

              echo "The audit selector is **observational only** and does not change execution." >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "- Reason: \`$AUDIT_REASON\`" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Category | Detected | Mode |" >> $GITHUB_STEP_SUMMARY
              echo "|----------|----------|------|" >> $GITHUB_STEP_SUMMARY
              echo "| run_all | ${AUDIT_RUN_ALL} | Audit |" >> $GITHUB_STEP_SUMMARY
              echo "| integrations | ${AUDIT_RUN_INTEGRATIONS} | Audit |" >> $GITHUB_STEP_SUMMARY
              echo "| cli_e2e | ${AUDIT_RUN_CLI_E2E} | Audit |" >> $GITHUB_STEP_SUMMARY
              echo "| extension | ${AUDIT_RUN_EXTENSION} | Audit |" >> $GITHUB_STEP_SUMMARY
              echo "| polyglot | ${AUDIT_RUN_POLYGLOT} | Audit |" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "**Audit selector affected test projects:** ${AUDIT_AFFECTED}" >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️ Audit selector failed and did not contribute observational data." >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "</details>" >> $GITHUB_STEP_SUMMARY

      - name: Show test selection results
        shell: bash
        run: |
          echo "::group::Active test selection"
          echo "run_all=${{ steps.detect.outputs.run_all }}"
          echo "run_integrations=${{ steps.detect.outputs.run_integrations }}"
          echo "run_cli_e2e=${{ steps.detect.outputs.run_cli_e2e }}"
          echo "run_extension=${{ steps.detect.outputs.run_extension }}"
          echo "run_polyglot=${{ steps.detect.outputs.run_polyglot }}"
          echo "affected_test_projects=${{ steps.detect.outputs.affected_test_projects }}"
          echo "default_coverage_projects=${{ steps.detect.outputs.default_coverage_projects }}"
          echo "::endgroup::"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "::group::Audit test selection"
            echo "run_all=${{ steps.detect_audit_raw.outputs.run_all }}"
            echo "run_integrations=${{ steps.detect_audit_raw.outputs.run_integrations }}"
            echo "run_cli_e2e=${{ steps.detect_audit_raw.outputs.run_cli_e2e }}"
            echo "run_extension=${{ steps.detect_audit_raw.outputs.run_extension }}"
            echo "run_polyglot=${{ steps.detect_audit_raw.outputs.run_polyglot }}"
            echo "selection_reason=${{ steps.detect_audit_raw.outputs.selection_reason }}"
            echo "affected_test_projects=${{ steps.detect_audit_raw.outputs.affected_test_projects }}"
            echo "::endgroup::"
          fi

      - name: Upload selector active artifact
        if: ${{ github.event_name == 'pull_request' && steps.detect_active_raw.outcome == 'success' }}
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: test-scope-selector-active
          path: ${{ github.workspace }}/artifacts/test-selection/selector-active.json
          if-no-files-found: error

      - name: Upload selector audit artifact
        if: ${{ github.event_name == 'pull_request' && steps.detect_audit_raw.outcome == 'success' }}
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: test-scope-selector-audit
          path: ${{ github.workspace }}/artifacts/test-selection/selector-audit.json
          if-no-files-found: error

      - uses: ./.github/actions/enumerate-tests
        id: generate_tests_matrix
        with:
          prepareEnvironment: 'false'
          buildArgs: '/p:IncludeTemplateTests=true /p:IncludeCliE2ETests=${{ steps.detect.outputs.run_all == ''true'' || steps.detect.outputs.run_cli_e2e == ''true'' }}'

      - name: Split matrix by dependency type
        id: split_matrix
        shell: pwsh
        run: |
          $splitScript = "${{ github.workspace }}/eng/scripts/split-test-matrix-by-deps.ps1"
          & $splitScript -AllTestsMatrix '${{ steps.generate_tests_matrix.outputs.all_tests }}' -OutputToGitHubEnv

      - name: Filter matrices by test scope
        id: filter_matrix
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "${{ github.workspace }}/artifacts/test-selection" -Force | Out-Null
          $filterScript = "${{ github.workspace }}/eng/scripts/filter-test-matrix-by-scope.ps1"
          $matrices = @{
            'tests_matrix_no_nugets' = '${{ steps.split_matrix.outputs.tests_matrix_no_nugets }}'
            'tests_matrix_no_nugets_overflow' = '${{ steps.split_matrix.outputs.tests_matrix_no_nugets_overflow }}'
            'tests_matrix_requires_nugets_linux' = '${{ steps.split_matrix.outputs.tests_matrix_requires_nugets_linux }}'
            'tests_matrix_requires_nugets_windows' = '${{ steps.split_matrix.outputs.tests_matrix_requires_nugets_windows }}'
            'tests_matrix_requires_nugets_macos' = '${{ steps.split_matrix.outputs.tests_matrix_requires_nugets_macos }}'
            'tests_matrix_requires_cli_archive' = '${{ steps.split_matrix.outputs.tests_matrix_requires_cli_archive }}'
          }
          $runAll = ('${{ steps.detect.outputs.run_all }}' -eq 'true')
          & $filterScript `
            -Matrices $matrices `
            -AffectedProjects '${{ steps.detect.outputs.affected_test_projects }}' `
            -DefaultCoverageProjects '${{ steps.detect.outputs.default_coverage_projects }}' `
            -RunAll:$runAll `
            -AuditFilePath "${{ github.workspace }}/artifacts/test-selection/matrix-audit.json" `
            -OutputToGitHubEnv

      - name: Write selected project summary
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "<details><summary>Matrix selection details</summary>"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Projects Selected After Matrix Filtering"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""

          $projectsJson = '${{ steps.filter_matrix.outputs.audit_would_run_projects }}'

          if ([string]::IsNullOrWhiteSpace($projectsJson)) {
            $projectsJson = '[]'
          }

          $projects = @($projectsJson | ConvertFrom-Json)
          if ($projects.Count -eq 0) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "*No test projects were selected after matrix filtering.*"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "</details>"
            exit 0
          }

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "The following test projects were selected after matrix filtering:"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""

          foreach ($project in $projects) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ('- `{0}`' -f $project)
          }

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "</details>"

      - name: Upload matrix audit artifact
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: test-scope-matrix-audit
          path: ${{ github.workspace }}/artifacts/test-selection/matrix-audit.json
          if-no-files-found: error

  build_packages:
    name: Build packages
    uses: ./.github/workflows/build-packages.yml
    with:
      versionOverrideArg: ${{ inputs.versionOverrideArg }}

  build_cli_archive_linux:
    name: Build native CLI archive (Linux)
    uses: ./.github/workflows/build-cli-native-archives.yml
    with:
      versionOverrideArg: ${{ inputs.versionOverrideArg }}
      targets: '[{"os": "ubuntu-latest", "runner": "8-core-ubuntu-latest", "rids": "linux-x64"}]'

  # Per-OS CLI archive builds produce RID-specific DCP and Dashboard NuGets.
  # Split by OS so that test jobs can depend on just their platform's archive,
  # allowing Linux tests to start as soon as the Linux archive completes
  # without waiting for the slower Windows/macOS builds.
  build_cli_archive_windows:
    name: Build native CLI archive (Windows)
    uses: ./.github/workflows/build-cli-native-archives.yml
    with:
      versionOverrideArg: ${{ inputs.versionOverrideArg }}
      targets: '[{"os": "windows-latest", "runner": "windows-latest", "rids": "win-x64"}]'

  build_cli_archive_macos:
    name: Build native CLI archive (macOS)
    uses: ./.github/workflows/build-cli-native-archives.yml
    with:
      versionOverrideArg: ${{ inputs.versionOverrideArg }}
      targets: '[{"os": "macos-latest", "runner": "macos-latest", "rids": "osx-arm64"}]'

  tests_no_nugets:
    name: ${{ matrix.shortname }}
    uses: ./.github/workflows/run-tests.yml
    needs: setup_for_tests
    if: ${{ fromJson(needs.setup_for_tests.outputs.tests_matrix_no_nugets).include[0] != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup_for_tests.outputs.tests_matrix_no_nugets) }}
    with:
      testShortName: ${{ matrix.shortname }}
      os: ${{ matrix.runs-on }}
      testProjectPath: ${{ matrix.testProjectPath }}
      testSessionTimeout: ${{ matrix.testSessionTimeout }}
      testHangTimeout: ${{ matrix.testHangTimeout }}
      extraTestArgs: "--filter-not-trait \"quarantined=true\" --filter-not-trait \"outerloop=true\" ${{ matrix.extraTestArgs }}"
      versionOverrideArg: ${{ inputs.versionOverrideArg }}
      requiresNugets: ${{ matrix.requiresNugets }}
      requiresTestSdk: ${{ matrix.requiresTestSdk }}
      enablePlaywrightInstall: ${{ matrix.enablePlaywrightInstall }}
      conditionalSelectionRunAll: ${{ needs.setup_for_tests.outputs.run_all }}
      directlyAffectedTestProjects: ${{ join(fromJson(needs.setup_for_tests.outputs.affected_test_projects), ';') }}

  tests_no_nugets_overflow:
    name: ${{ matrix.shortname }}
    uses: ./.github/workflows/run-tests.yml
    needs: setup_for_tests
    if: ${{ fromJson(needs.setup_for_tests.outputs.tests_matrix_no_nugets_overflow).include[0] != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup_for_tests.outputs.tests_matrix_no_nugets_overflow) }}
    with:
      testShortName: ${{ matrix.shortname }}
      os: ${{ matrix.runs-on }}
      testProjectPath: ${{ matrix.testProjectPath }}
      testSessionTimeout: ${{ matrix.testSessionTimeout }}
      testHangTimeout: ${{ matrix.testHangTimeout }}
      extraTestArgs: "--filter-not-trait \"quarantined=true\" --filter-not-trait \"outerloop=true\" ${{ matrix.extraTestArgs }}"
      versionOverrideArg: ${{ inputs.versionOverrideArg }}
      requiresNugets: ${{ matrix.requiresNugets }}
      requiresTestSdk: ${{ matrix.requiresTestSdk }}
      enablePlaywrightInstall: ${{ matrix.enablePlaywrightInstall }}
      conditionalSelectionRunAll: ${{ needs.setup_for_tests.outputs.run_all }}
      directlyAffectedTestProjects: ${{ join(fromJson(needs.setup_for_tests.outputs.affected_test_projects), ';') }}

  # Split requires-nugets tests by OS so each group depends only on
  # the CLI archive build for its platform, avoiding cross-OS blocking.
  tests_requires_nugets_linux:
    name: ${{ matrix.shortname }}
    uses: ./.github/workflows/run-tests.yml
    needs: [setup_for_tests, build_packages, build_cli_archive_linux]
    if: ${{ fromJson(needs.setup_for_tests.outputs.tests_matrix_requires_nugets_linux).include[0] != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup_for_tests.outputs.tests_matrix_requires_nugets_linux) }}
    with:
      testShortName: ${{ matrix.shortname }}
      os: ${{ matrix.runs-on }}
      testProjectPath: ${{ matrix.testProjectPath }}
      testSessionTimeout: ${{ matrix.testSessionTimeout }}
      testHangTimeout: ${{ matrix.testHangTimeout }}
      extraTestArgs: "--filter-not-trait \"quarantined=true\" --filter-not-trait \"outerloop=true\" ${{ matrix.extraTestArgs }}"
      versionOverrideArg: ${{ inputs.versionOverrideArg }}
      requiresNugets: ${{ matrix.requiresNugets }}
      requiresTestSdk: ${{ matrix.requiresTestSdk }}
      enablePlaywrightInstall: ${{ matrix.enablePlaywrightInstall }}
      conditionalSelectionRunAll: ${{ needs.setup_for_tests.outputs.run_all }}
      directlyAffectedTestProjects: ${{ join(fromJson(needs.setup_for_tests.outputs.affected_test_projects), ';') }}

  tests_requires_nugets_windows:
    name: ${{ matrix.shortname }}
    uses: ./.github/workflows/run-tests.yml
    needs: [setup_for_tests, build_packages, build_cli_archive_windows]
    if: ${{ fromJson(needs.setup_for_tests.outputs.tests_matrix_requires_nugets_windows).include[0] != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup_for_tests.outputs.tests_matrix_requires_nugets_windows) }}
    with:
      testShortName: ${{ matrix.shortname }}
      os: ${{ matrix.runs-on }}
      testProjectPath: ${{ matrix.testProjectPath }}
      testSessionTimeout: ${{ matrix.testSessionTimeout }}
      testHangTimeout: ${{ matrix.testHangTimeout }}
      extraTestArgs: "--filter-not-trait \"quarantined=true\" --filter-not-trait \"outerloop=true\" ${{ matrix.extraTestArgs }}"
      versionOverrideArg: ${{ inputs.versionOverrideArg }}
      requiresNugets: ${{ matrix.requiresNugets }}
      requiresTestSdk: ${{ matrix.requiresTestSdk }}
      enablePlaywrightInstall: ${{ matrix.enablePlaywrightInstall }}
      conditionalSelectionRunAll: ${{ needs.setup_for_tests.outputs.run_all }}
      directlyAffectedTestProjects: ${{ join(fromJson(needs.setup_for_tests.outputs.affected_test_projects), ';') }}

  tests_requires_nugets_macos:
    name: ${{ matrix.shortname }}
    uses: ./.github/workflows/run-tests.yml
    needs: [setup_for_tests, build_packages, build_cli_archive_macos]
    if: ${{ fromJson(needs.setup_for_tests.outputs.tests_matrix_requires_nugets_macos).include[0] != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup_for_tests.outputs.tests_matrix_requires_nugets_macos) }}
    with:
      testShortName: ${{ matrix.shortname }}
      os: ${{ matrix.runs-on }}
      testProjectPath: ${{ matrix.testProjectPath }}
      testSessionTimeout: ${{ matrix.testSessionTimeout }}
      testHangTimeout: ${{ matrix.testHangTimeout }}
      extraTestArgs: "--filter-not-trait \"quarantined=true\" --filter-not-trait \"outerloop=true\" ${{ matrix.extraTestArgs }}"
      versionOverrideArg: ${{ inputs.versionOverrideArg }}
      requiresNugets: ${{ matrix.requiresNugets }}
      requiresTestSdk: ${{ matrix.requiresTestSdk }}
      enablePlaywrightInstall: ${{ matrix.enablePlaywrightInstall }}
      conditionalSelectionRunAll: ${{ needs.setup_for_tests.outputs.run_all }}
      directlyAffectedTestProjects: ${{ join(fromJson(needs.setup_for_tests.outputs.affected_test_projects), ';') }}

  tests_requires_cli_archive:
    name: ${{ matrix.shortname }}
    uses: ./.github/workflows/run-tests.yml
    needs: [setup_for_tests, build_packages, build_cli_archive_linux]
    if: ${{ fromJson(needs.setup_for_tests.outputs.tests_matrix_requires_cli_archive).include[0] != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup_for_tests.outputs.tests_matrix_requires_cli_archive) }}
    with:
      testShortName: ${{ matrix.shortname }}
      os: ${{ matrix.runs-on }}
      testProjectPath: ${{ matrix.testProjectPath }}
      testSessionTimeout: ${{ matrix.testSessionTimeout }}
      testHangTimeout: ${{ matrix.testHangTimeout }}
      extraTestArgs: "--filter-not-trait \"quarantined=true\" --filter-not-trait \"outerloop=true\" ${{ matrix.extraTestArgs }}"
      versionOverrideArg: ${{ inputs.versionOverrideArg }}
      requiresNugets: ${{ matrix.requiresNugets }}
      requiresTestSdk: ${{ matrix.requiresTestSdk }}
      requiresCliArchive: true
      enablePlaywrightInstall: ${{ matrix.enablePlaywrightInstall }}
      conditionalSelectionRunAll: ${{ needs.setup_for_tests.outputs.run_all }}
      directlyAffectedTestProjects: ${{ join(fromJson(needs.setup_for_tests.outputs.affected_test_projects), ';') }}

  polyglot_validation:
    name: Polyglot SDK Validation
    uses: ./.github/workflows/polyglot-validation.yml
    needs: [setup_for_tests, build_packages, build_cli_archive_linux]
    if: |
      needs.setup_for_tests.outputs.run_all == 'true' ||
      needs.setup_for_tests.outputs.run_polyglot == 'true'
    with:
      versionOverrideArg: ${{ inputs.versionOverrideArg }}

  extension_tests_win:
    name: Run VS Code extension tests (Windows)
    runs-on: windows-latest
    needs: setup_for_tests
    if: |
      needs.setup_for_tests.outputs.run_all == 'true' ||
      needs.setup_for_tests.outputs.run_extension == 'true'
    defaults:
      run:
        working-directory: ./extension
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Setup Node.js environment
        uses: actions/setup-node@v2
        with:
          node-version: '20.x'
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test
      - name: Package VSIX
        run: npm exec @vscode/vsce -- package --pre-release -o out/aspire-extension.vsix
      - name: Upload VSIX
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: aspire-extension
          path: extension/out/aspire-extension.vsix

  results:
    if: ${{ always() && github.repository_owner == 'dotnet' }}
    runs-on: ubuntu-latest
    name: Final Test Results
    needs: [
      setup_for_tests,
      build_packages,
      build_cli_archive_linux,
      build_cli_archive_windows,
      build_cli_archive_macos,
      extension_tests_win,
      tests_no_nugets,
      tests_no_nugets_overflow,
      tests_requires_nugets_linux,
      tests_requires_nugets_windows,
      tests_requires_nugets_macos,
      tests_requires_cli_archive,
      polyglot_validation,
    ]
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        continue-on-error: true
        with:
          pattern: logs-*-ubuntu-latest
          merge-multiple: true
          path: ${{ github.workspace }}/testresults/ubuntu-latest

      - uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        continue-on-error: true
        with:
          pattern: logs-*-windows-latest
          merge-multiple: true
          path: ${{ github.workspace }}/testresults/windows-latest

      - uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        continue-on-error: true
        with:
          pattern: logs-*-macos-latest
          merge-multiple: true
          path: testresults/macos-latest

      - name: Download selector active artifact
        if: ${{ github.event_name == 'pull_request' }}
        continue-on-error: true
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          name: test-scope-selector-active
          path: ${{ github.workspace }}/audit/selector/active

      - name: Download selector audit artifact
        if: ${{ github.event_name == 'pull_request' }}
        continue-on-error: true
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          name: test-scope-selector-audit
          path: ${{ github.workspace }}/audit/selector/audit

      - name: Download matrix audit artifact
        if: ${{ github.event_name == 'pull_request' }}
        continue-on-error: true
        uses: actions/download-artifact@cc203385981b70ca67e1cc392babf9cc229d5806 # v4.1.9
        with:
          name: test-scope-matrix-audit
          path: ${{ github.workspace }}/audit/matrix

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: All-TestResults
          path: ${{ github.workspace }}/testresults/**/*.trx
          if-no-files-found: ignore

      - name: Generate test results summary
        if: always()
        shell: bash
        run: |
          ${{ github.workspace }}/dotnet.sh \
            run \
            --project ${{ github.workspace }}/tools/GenerateTestSummary/GenerateTestSummary.csproj \
            -- \
            ${{ github.workspace }}/testresults \
            --combined

      - name: Compare audit predictions to failures
        if: ${{ always() && github.event_name == 'pull_request' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "${{ github.workspace }}/audit/results" -Force | Out-Null
          $script = "${{ github.workspace }}/eng/scripts/find-test-scope-audit-misses.ps1"
          & $script `
            -SelectorActivePath "${{ github.workspace }}/audit/selector/active/selector-active.json" `
            -SelectorAuditPath "${{ github.workspace }}/audit/selector/audit/selector-audit.json" `
            -MatrixAuditPath "${{ github.workspace }}/audit/matrix/matrix-audit.json" `
            -TestResultsRoot "${{ github.workspace }}/testresults" `
            -OutputPath "${{ github.workspace }}/audit/results/audit-miss-report.json"

      - name: Append audit miss summary
        if: ${{ always() && github.event_name == 'pull_request' }}
        shell: pwsh
        run: |
          $reportPath = "${{ github.workspace }}/audit/results/audit-miss-report.json"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '<details><summary>Test Scope Audit</summary>'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '## Test Scope Audit'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''

          if (-not (Test-Path $reportPath)) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '*Audit report was not produced.*'
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '</details>'
            exit 0
          }

          $report = Get-Content -Path $reportPath -Raw | ConvertFrom-Json
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ('- Status: `{0}`' -f $report.status)
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ('- Active selector run_all: `{0}`' -f $report.activeSelectorRunAll)
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ('- Active selector reason: `{0}`' -f $report.activeSelectorReason)
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ('- Audit selector run_all: `{0}`' -f $report.auditSelectorRunAll)
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ('- Audit selector reason: `{0}`' -f $report.auditSelectorReason)

          if ($null -ne $report.templateGate) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ('- Template test project would run: `{0}`' -f $report.templateGate.wouldRun)
          }

          if (@($report.missingArtifacts).Count -gt 0) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ('- Missing audit artifacts: `{0}`' -f (@($report.missingArtifacts) -join ', '))
          }

          if (@($report.auditMisses).Count -eq 0) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value 'No audit misses detected.'
          } else {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '**Audit misses detected:**'
            foreach ($miss in @($report.auditMisses)) {
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ('- `{0}` from `{1}`' -f $miss.testProjectPath, $miss.trxFile)
            }
          }

          if (@($report.unmappedFailedResults).Count -gt 0) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '**Unmapped failed TRX files:**'
            foreach ($entry in @($report.unmappedFailedResults)) {
              Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ('- `{0}`' -f $entry.trxFile)
            }
          }

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '</details>'

      - name: Upload audit miss report
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: test-scope-audit-report
          path: ${{ github.workspace }}/audit/results/audit-miss-report.json
          if-no-files-found: warn

      - name: Fail if any dependency failed
        # 'skipped' can be when a transitive dependency fails and the dependent job gets 'skipped'.
        # For example, one of setup_* jobs failing and the dependent test jobs getting 'skipped'.
        # Some jobs are optional and can have an empty matrix. In those cases we allow a 'skipped'
        # result instead of treating it as a failure.
        # Jobs may also be legitimately skipped when their category is not needed.
        if: >-
          ${{ always() &&
              (contains(needs.*.result, 'failure') ||
               contains(needs.*.result, 'cancelled') ||
               ((fromJson(needs.setup_for_tests.outputs.tests_matrix_no_nugets).include[0] != null &&
                 needs.tests_no_nugets.result == 'skipped') ||
                (fromJson(needs.setup_for_tests.outputs.tests_matrix_requires_nugets_linux).include[0] != null &&
                 needs.tests_requires_nugets_linux.result == 'skipped') ||
                (fromJson(needs.setup_for_tests.outputs.tests_matrix_requires_nugets_windows).include[0] != null &&
                 needs.tests_requires_nugets_windows.result == 'skipped') ||
                 (fromJson(needs.setup_for_tests.outputs.tests_matrix_requires_nugets_macos).include[0] != null &&
                  needs.tests_requires_nugets_macos.result == 'skipped') ||
                 (fromJson(needs.setup_for_tests.outputs.tests_matrix_requires_cli_archive).include[0] != null &&
                  needs.tests_requires_cli_archive.result == 'skipped') ||
                 ((needs.setup_for_tests.outputs.run_all == 'true' ||
                   needs.setup_for_tests.outputs.run_extension == 'true') &&
                  needs.extension_tests_win.result == 'skipped') ||
                 ((needs.setup_for_tests.outputs.run_all == 'true' ||
                   needs.setup_for_tests.outputs.run_polyglot == 'true') &&
                  needs.polyglot_validation.result == 'skipped'))) }}
        run: |
          echo "One or more test jobs failed, were cancelled, or were unexpectedly skipped."
          exit 1
